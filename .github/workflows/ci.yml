name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  test:
    name: Python ${{ matrix.python }} on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint with flake8
        run: |
          flake8 src/wdi_etl/ --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 src/wdi_etl/ --count --exit-zero --max-complexity=10 --max-line-length=100 --statistics

      - name: Type-check with mypy
        run: mypy src/wdi_etl/ --ignore-missing-imports

      - name: Run tests
        run: pytest tests/ -v --cov=wdi_etl --cov-report=xml --cov-report=term

      - name: Upload coverage
        uses: codecov/codecov-action@v3
        with:
          file: ./coverage.xml
          fail_ci_if_error: false

      - name: Run pipeline smoke test
        run: python -m wdi_etl --skip-extract --skip-parquet

  lint:
    name: Code quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Check import sorting
        run: isort --check-only --diff src/wdi_etl/

      - name: Check code formatting
        run: black --check --diff src/wdi_etl/

      - name: Run security scan
        run: pip install bandit && bandit -r src/wdi_etl/ -f json -o bandit-report.json || true
