name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  test:
    name: Python ${{ matrix.python }} on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python: ["3.10", "3.11"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Lint with flake8
        run: pip install flake8 && flake8 src/ --count --select=E9,F63,F7,F82 --show-source --statistics

      - name: Type-check with mypy
        run: pip install mypy && mypy src/ --ignore-missing-imports

      - name: Run tests
        run: pip install pytest pytest-cov && pytest tests/ -v --cov=wdi_etl --cov-report=xml

      - name: Run pipeline smoke test
        run: python -m wdi_etl --skip-extract --skip-parquet

  lint:
    name: Code quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install black isort
      - run: isort --check-only --diff src/
      - run: black --check --diff src/
